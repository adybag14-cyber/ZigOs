name: Build ZigOs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install NASM
        shell: pwsh
        run: choco install nasm -y --no-progress

      - name: Build with canonical Zig
        shell: pwsh
        run: .\scripts\build.ps1 -Clean

      - name: Upload UEFI image
        uses: actions/upload-artifact@v4
        with:
          name: ZigOs-BOOTX64
          path: zig-out/EFI/BOOT/BOOTX64.EFI
          if-no-files-found: error
