name: Build ZigOs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install NASM and QEMU
        shell: pwsh
        run: choco install nasm qemu -y --no-progress

      - name: Build x86-64 UEFI with canonical Zig
        shell: pwsh
        run: .\scripts\build.ps1 -Clean

      - name: Build legacy i686 kernel with canonical Zig
        shell: pwsh
        run: .\scripts\build-legacy-i686.ps1

      - name: Check canonical Zig formatting
        shell: pwsh
        run: |
          $version = (Get-Content .toolchain-version -Raw).Trim()
          $zig = ".toolchains\zig-canonical\zig-x86_64-windows-$version\zig.exe"
          & $zig fmt --check src
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Boot-test legacy BIOS i686 image
        shell: pwsh
        run: .\scripts\test-legacy-i686.ps1 -TimeoutSeconds 20

      - name: Upload UEFI image
        uses: actions/upload-artifact@v7
        with:
          name: ZigOs-BOOTX64
          path: zig-out/EFI/BOOT/BOOTX64.EFI
          if-no-files-found: error


      - name: Upload legacy i686 kernel
        uses: actions/upload-artifact@v7
        with:
          name: ZigOs-i686-kernel
          path: |
            zig-out/legacy/i686/ZIGOS386.ELF
            zig-out/legacy/i686/ZIGOS386.BIN
            zig-out/legacy/i686/BOOTSECT.BIN
            zig-out/legacy/i686/STAGE1.BIN
            zig-out/legacy/i686/ZIGOS386.IMG
          if-no-files-found: error
