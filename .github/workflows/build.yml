name: Build ZigOs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install NASM
        shell: pwsh
        run: choco install nasm -y --no-progress

      - name: Build with canonical Zig
        shell: pwsh
        run: .\scripts\build.ps1 -Clean

      - name: Check canonical Zig formatting
        shell: pwsh
        run: |
          $version = (Get-Content .toolchain-version -Raw).Trim()
          $zig = ".toolchains\zig-canonical\zig-x86_64-windows-$version\zig.exe"
          & $zig fmt --check src
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload UEFI image
        uses: actions/upload-artifact@v7
        with:
          name: ZigOs-BOOTX64
          path: zig-out/EFI/BOOT/BOOTX64.EFI
          if-no-files-found: error
